<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лена • Контроль ферритина v3</title>

<style>

:root{
--primary:#4a7dff;
--primary-light:#73a0ff;
--green:#22c55e;
--yellow:#f59e0b;
--red:#ef4444;
--gray:#cbd5e1;

--text:#1f2937;
--muted:#6b7280;

--shadow:
0 12px 32px rgba(15,23,42,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:linear-gradient(
180deg,
#f8fbff 0%,
#eef5fb 100%
);
padding:18px;
max-width:1400px;
margin:auto;
color:var(--text);
}

.hero{
background:white;
border-radius:30px;
padding:24px;
box-shadow:var(--shadow);
margin-bottom:20px;
}

.hero h1{
font-size:34px;
margin-bottom:8px;
}

.hero p{
color:var(--muted);
}

.tabs{
display:flex;
gap:10px;
margin:20px 0;
}

.tab{
flex:1;
padding:14px;
border:none;
border-radius:18px;
background:white;
box-shadow:var(--shadow);
font-size:16px;
font-weight:600;
cursor:pointer;
}

.tab.active{
background:var(--primary);
color:white;
}

.page{
display:none;
}

.page.active{
display:block;
}

.card{
background:white;
border-radius:24px;
padding:20px;
box-shadow:var(--shadow);
margin-bottom:20px;
}

.form-group{
margin-bottom:14px;
}

.form-group label{
display:block;
margin-bottom:6px;
font-weight:600;
}

.form-group input{
width:100%;
padding:12px;
border:1px solid #dbe4ef;
border-radius:12px;
font-size:16px;
}

.save-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:var(--primary);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.weekday{
text-align:center;
font-weight:700;
color:var(--muted);
padding:8px;
}

.day{
background:white;
border-radius:18px;
padding:10px;
min-height:110px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.today{
outline:3px solid var(--primary);
}

.day-number{
font-size:22px;
font-weight:700;
margin-bottom:8px;
}

.month-nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.month-nav button{
width:52px;
height:52px;
border:none;
border-radius:16px;
background:var(--primary);
color:white;
font-size:24px;
}

.month-title{
font-size:28px;
font-weight:700;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.stat{
background:white;
padding:16px;
border-radius:18px;
box-shadow:var(--shadow);
text-align:center;
}

.stat-value{
font-size:28px;
font-weight:700;
color:var(--primary);
}

.stat-label{
font-size:13px;
color:var(--muted);
margin-top:4px;
}

@media(max-width:900px){

.stats{
grid-template-columns:1fr;
}

.calendar{
grid-template-columns:repeat(7,minmax(90px,1fr));
overflow:auto;
}

}

</style>

</head>

<body>

<div class="hero">

<h1>💊 Лена</h1>

<p>
Контроль приема Тардиферрона,
анализов и настроек курса
</p>

</div>

<div class="tabs">

<button class="tab active" data-tab="meds">
💊 Прием
</button>

<button class="tab" data-tab="analysis">
🩸 Анализы
</button>

<button class="tab" data-tab="settings">
⚙️ Настройки
</button>

</div>


<div id="meds" class="page active">

<div class="stats">

<div class="stat">
<div id="todayStat" class="stat-value">0/2</div>
<div class="stat-label">Сегодня</div>
</div>

<div class="stat">
<div id="monthPercent" class="stat-value">0%</div>
<div class="stat-label">Выполнение</div>
</div>

<div class="stat">
<div id="streakStat" class="stat-value">0</div>
<div class="stat-label">🔥 Серия</div>
</div>
<div class="stat">
<div id="courseDayStat" class="stat-value">1</div>
<div class="stat-label">💊 День курса</div>
</div>
</div>

<div class="card">

<div class="month-nav">

<button id="prev">
‹
</button>

<div id="monthTitle" class="month-title">
Месяц
</div>

<button id="next">
›
</button>

</div>

<div id="calendar" class="calendar"></div>

</div>

</div>


<div id="analysis" class="page">

<div class="card">

<h2 style="margin-bottom:20px;">
🩸 Анализы
</h2>

<div class="form-group">
<label>Ферритин</label>
<input id="ferritinInput" type="number">
</div>

<div class="form-group">
<label>Гемоглобин</label>
<input id="hemoglobinInput" type="number">
</div>

<div class="form-group">
<label>Дата анализа</label>
<input id="analysisDateInput" type="date">
</div>

<button
id="saveAnalysis"
class="save-btn"
>
Сохранить анализы
</button>

</div>

</div>


<div id="settings" class="page">

<div class="card">

<h2 style="margin-bottom:20px;">
⚙️ Настройки
</h2>

<div class="form-group">
<label>Доза (мг)</label>
<input id="doseInput" type="number" value="80">
</div>

<div class="form-group">
<label>Утро с</label>
<input id="morningFrom" type="time" value="05:00">
</div>

<div class="form-group">
<label>Утро до</label>
<input id="morningTo" type="time" value="10:00">
</div>

<div class="form-group">
<label>Вечер с</label>
<input id="eveningFrom" type="time" value="20:00">
</div>

<div class="form-group">
<label>Вечер до</label>
<input id="eveningTo" type="time" value="22:00">
</div>
<div class="form-group">
<label>Дата начала курса</label>
<input id="courseStartDate" type="date">
</div>
<button
id="saveSettings"
class="save-btn"
>
Сохранить настройки
</button>

</div>

</div>
<script>

const tabs = document.querySelectorAll(".tab");
const pages = document.querySelectorAll(".page");

tabs.forEach(tab=>{

tab.addEventListener("click",()=>{

tabs.forEach(t=>t.classList.remove("active"));
pages.forEach(p=>p.classList.remove("active"));

tab.classList.add("active");

document
.getElementById(tab.dataset.tab)
.classList.add("active");

});

});

const calendar =
document.getElementById("calendar");

const monthTitle =
document.getElementById("monthTitle");

const weekdays =
["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

const months = [
"Январь","Февраль","Март","Апрель",
"Май","Июнь","Июль","Август",
"Сентябрь","Октябрь","Ноябрь","Декабрь"
];

let currentDate = new Date();

function storageKey(date,type){
return `lena_tardy_${date}_${type}`;
}

function calculateStreak(){

let streak = 0;

let date = new Date();

while(true){

date.setDate(date.getDate()-1);

const ds =
`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;

const morning =
localStorage.getItem(
storageKey(ds,"morning")
)==="true";

const evening =
localStorage.getItem(
storageKey(ds,"evening")
)==="true";

if(morning && evening){
streak++;
}else{
break;
}

}

return streak;

}

function renderCalendar(){

calendar.innerHTML="";

weekdays.forEach(day=>{

const div=document.createElement("div");

div.className="weekday";
div.innerText=day;

calendar.appendChild(div);

});

const year =
currentDate.getFullYear();

const month =
currentDate.getMonth();

monthTitle.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1);

let startDay =
firstDay.getDay();

startDay =
startDay===0 ? 6 : startDay-1;

const daysInMonth =
new Date(year,month+1,0).getDate();

for(let i=0;i<startDay;i++){

const empty =
document.createElement("div");

calendar.appendChild(empty);

}

let checked = 0;
let total = daysInMonth * 2;

const now = new Date();

let todayTaken = 0;

for(let day=1;day<=daysInMonth;day++){

const dateString =
`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

const morning =
localStorage.getItem(
storageKey(dateString,"morning")
)==="true";

const evening =
localStorage.getItem(
storageKey(dateString,"evening")
)==="true";

if(morning) checked++;
if(evening) checked++;

const box =
document.createElement("div");

box.className="day";

if(
day===now.getDate() &&
month===now.getMonth() &&
year===now.getFullYear()
){
box.classList.add("today");

if(morning) todayTaken++;
if(evening) todayTaken++;
}

box.innerHTML=`

<div class="day-number">
${day}
</div>

<label>
<input
type="checkbox"
data-date="${dateString}"
data-type="morning"
${morning ? "checked" : ""}
>
🌅
</label>

<br><br>

<label>
<input
type="checkbox"
data-date="${dateString}"
data-type="evening"
${evening ? "checked" : ""}
>
🌙
</label>

`;

calendar.appendChild(box);

}

const percent =
Math.round(
(checked/total)*100
);

document
.getElementById("monthPercent")
.innerText =
percent + "%";

document
.getElementById("todayStat")
.innerText =
todayTaken + "/2";

document
.getElementById("streakStat")
.innerText =
calculateStreak();

document
.querySelectorAll(
"input[type='checkbox']"
)
.forEach(box=>{

box.addEventListener(
"change",
function(){

localStorage.setItem(
storageKey(
this.dataset.date,
this.dataset.type
),
this.checked
);

renderCalendar();

}
);

});

}

document
.getElementById("prev")
.onclick=()=>{

currentDate.setMonth(
currentDate.getMonth()-1
);

renderCalendar();

};

document
.getElementById("next")
.onclick=()=>{

currentDate.setMonth(
currentDate.getMonth()+1
);

renderCalendar();

};

document
.getElementById("saveAnalysis")
.addEventListener(
"click",
()=>{

localStorage.setItem(
"ferritin",
document.getElementById(
"ferritinInput"
).value
);

localStorage.setItem(
"hemoglobin",
document.getElementById(
"hemoglobinInput"
).value
);

localStorage.setItem(
"analysisDate",
document.getElementById(
"analysisDateInput"
).value
);

alert("Анализы сохранены");

}
);

document
.getElementById("saveSettings")
.addEventListener(
"click",
()=>{

localStorage.setItem(
"dose",
document.getElementById(
"doseInput"
).value
);

localStorage.setItem(
"morningFrom",
document.getElementById(
"morningFrom"
).value
);

localStorage.setItem(
"morningTo",
document.getElementById(
"morningTo"
).value
);

localStorage.setItem(
"eveningFrom",
document.getElementById(
"eveningFrom"
).value
);

localStorage.setItem(
"eveningTo",
document.getElementById(
"eveningTo"
).value
);
localStorage.setItem(
"courseStartDate",
document.getElementById(
"courseStartDate"
).value
);
alert("Настройки сохранены");

}
);

function loadSavedData(){

document.getElementById(
"ferritinInput"
).value =
localStorage.getItem(
"ferritin"
) || "";

document.getElementById(
"hemoglobinInput"
).value =
localStorage.getItem(
"hemoglobin"
) || "";

document.getElementById(
"analysisDateInput"
).value =
localStorage.getItem(
"analysisDate"
) || "";

document.getElementById(
"doseInput"
).value =
localStorage.getItem(
"dose"
) || "80";

document.getElementById(
"morningFrom"
).value =
localStorage.getItem(
"morningFrom"
) || "05:00";

document.getElementById(
"morningTo"
).value =
localStorage.getItem(
"morningTo"
) || "10:00";

document.getElementById(
"eveningFrom"
).value =
localStorage.getItem(
"eveningFrom"
) || "20:00";

document.getElementById(
"eveningTo"
).value =
localStorage.getItem(
"eveningTo"
) || "22:00";

}

loadSavedData();
document.getElementById(
"courseStartDate"
).value =
localStorage.getItem(
"courseStartDate"
) || "";
function updateCourseDay(){

const startDate =
localStorage.getItem(
"courseStartDate"
);

if(!startDate){
return;
}

const start =
new Date(startDate);

const today =
new Date();

const diff =
Math.floor(
(today - start) /
(1000*60*60*24)
);

document.getElementById(
"courseDayStat"
).innerText =
diff + 1;

}
loadSavedData();

updateCourseDay();

renderCalendar();

</script>

</body>
</html>
