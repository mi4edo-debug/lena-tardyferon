<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лена ❤️ Тардиферрон</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#eef4f8;
padding:16px;
color:#1f2937;
max-width:1200px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:24px;
}

.header h1{
font-size:32px;
font-weight:700;
margin-bottom:8px;
}

.header p{
color:#6b7280;
font-size:16px;
}

.card{
background:#fff;
border-radius:22px;
padding:20px;
box-shadow:0 8px 24px rgba(0,0,0,.06);
margin-bottom:20px;
}

.today-title{
font-size:22px;
font-weight:700;
margin-bottom:14px;
color:#2563eb;
}

.today-row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:18px;
}

.progress-wrap{
margin-top:16px;
}

.progress-bar{
height:12px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#3b82f6;
transition:.3s;
}

.progress-text{
margin-top:8px;
font-size:14px;
color:#6b7280;
}

.info{
margin-top:16px;
line-height:1.7;
}

.month-nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.month-nav button{
width:52px;
height:52px;
border:none;
border-radius:16px;
background:#3b82f6;
color:white;
font-size:20px;
font-weight:bold;
}

.month-title{
font-size:30px;
font-weight:700;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.weekday{
text-align:center;
font-weight:700;
padding:8px;
font-size:14px;
color:#6b7280;
}

.day{
background:white;
border-radius:18px;
padding:8px;
min-height:115px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
position:relative;
}

.day-number{
font-weight:700;
font-size:18px;
display:flex;
align-items:center;
gap:6px;
margin-bottom:6px;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
}

.green{
background:#22c55e;
}

.yellow{
background:#f59e0b;
}

.red{
background:#ef4444;
}

.gray{
background:#d1d5db;
}

.today{
outline:3px solid #3b82f6;
}

label{
display:block;
font-size:13px;
margin-top:5px;
}

input[type="checkbox"]{
width:18px;
height:18px;
vertical-align:middle;
margin-right:4px;
}

.empty{
visibility:hidden;
}

@media(max-width:900px){

.calendar{
grid-template-columns:repeat(7,minmax(80px,1fr));
overflow-x:auto;
}

.month-title{
font-size:22px;
}

.day{
min-height:110px;
}

}

</style>
</head>

<body>

<div class="header">
<h1>❤️ ЛЕНА ❤️</h1>
<p>Тардиферрон 80 мг × 2 раза в день</p>
</div>

<div class="card">

<div class="today-title">
Сегодня
</div>

<div id="todayMorning" class="today-row">
<span>🌅 Утро</span>
<span>⬜</span>
</div>

<div id="todayEvening" class="today-row">
<span>🌙 Вечер</span>
<span>⬜</span>
</div>

<div class="progress-wrap">
<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div class="progress-text">
Выполнение месяца:
<span id="progress">0%</span>
</div>
</div>

<div class="info">
<strong>Утро:</strong> 05:00–10:00<br>
<strong>Вечер:</strong> 20:00–22:00
</div>

</div>

<div class="month-nav">
<button id="prev">◀</button>
<div id="monthTitle" class="month-title"></div>
<button id="next">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<script>

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");
const progress = document.getElementById("progress");

const weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

const months = [
"Январь","Февраль","Март","Апрель",
"Май","Июнь","Июль","Август",
"Сентябрь","Октябрь","Ноябрь","Декабрь"
];

let currentDate = new Date();

function storageKey(date,type){
return `lena_tardy_${date}_${type}`;
}

function renderCalendar(){

calendar.innerHTML="";

weekdays.forEach(day=>{
const div=document.createElement("div");
div.className="weekday";
div.innerText=day;
calendar.appendChild(div);
});

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

monthTitle.innerText=`${months[month]} ${year}`;

const firstDay=new Date(year,month,1);

let startDay=firstDay.getDay();
startDay=startDay===0?6:startDay-1;

const daysInMonth=new Date(year,month+1,0).getDate();

for(let i=0;i<startDay;i++){
const empty=document.createElement("div");
empty.className="day empty";
calendar.appendChild(empty);
}

let checked=0;
let total=daysInMonth*2;

const now = new Date();

for(let day=1;day<=daysInMonth;day++){

const dateString =
`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

const morning =
localStorage.getItem(storageKey(dateString,"morning"))==="true";

const evening =
localStorage.getItem(storageKey(dateString,"evening"))==="true";

if(morning) checked++;
if(evening) checked++;

const div=document.createElement("div");

const cellDate = new Date(year,month,day);

let dotClass="gray";

if(cellDate < new Date(now.getFullYear(),now.getMonth(),now.getDate())){

if(morning && evening){
dotClass="green";
}else if(morning || evening){
dotClass="yellow";
}else{
dotClass="red";
}

}else{

if(morning && evening){
dotClass="green";
}else if(morning || evening){
dotClass="yellow";
}

}

div.className="day";

if(
day===now.getDate() &&
month===now.getMonth() &&
year===now.getFullYear()
){
div.classList.add("today");
}

div.innerHTML=`
<div class="day-number">
${day}
<span class="status-dot ${dotClass}"></span>
</div>

<label>
<input
type="checkbox"
data-date="${dateString}"
data-type="morning"
${morning ? "checked" : ""}
>
Утро
</label>

<label>
<input
type="checkbox"
data-date="${dateString}"
data-type="evening"
${evening ? "checked" : ""}
>
Вечер
</label>
`;

calendar.appendChild(div);

}

const percent = Math.round((checked/total)*100);

progress.innerText = percent + "%";

document.getElementById("progressFill").style.width =
percent + "%";

const todayString =
`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

const todayMorning =
localStorage.getItem(
storageKey(todayString,"morning")
)==="true";

const todayEvening =
localStorage.getItem(
storageKey(todayString,"evening")
)==="true";

document.getElementById("todayMorning").innerHTML =
`<span>🌅 Утро</span><span>${todayMorning ? "✅" : "⬜"}</span>`;

document.getElementById("todayEvening").innerHTML =
`<span>🌙 Вечер</span><span>${todayEvening ? "✅" : "⬜"}</span>`;

document.querySelectorAll("input[type='checkbox']").forEach(box=>{

box.addEventListener("change",function(){

localStorage.setItem(
storageKey(
this.dataset.date,
this.dataset.type
),
this.checked
);

renderCalendar();

});

});

}

document.getElementById("prev").onclick=()=>{
currentDate.setMonth(currentDate.getMonth()-1);
renderCalendar();
};

document.getElementById("next").onclick=()=>{
currentDate.setMonth(currentDate.getMonth()+1);
renderCalendar();
};

renderCalendar();

</script>

</body>
</html>
