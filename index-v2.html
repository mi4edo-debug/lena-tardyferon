<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лена ❤️ Тардиферрон</title>

<style>

:root{
--bg:#f4f8fc;
--card:#ffffff;
--primary:#4a7dff;
--text:#1f2937;
--muted:#6b7280;
--green:#22c55e;
--yellow:#f59e0b;
--red:#ef4444;
--gray:#cbd5e1;
--shadow:0 12px 32px rgba(15,23,42,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
background:linear-gradient(
180deg,
#f8fbff 0%,
#eef5fb 100%
);
padding:18px;
color:var(--text);
max-width:1400px;
margin:auto;
}

.hero{
background:linear-gradient(
135deg,
#ffffff 0%,
#f7fbff 100%
);
border-radius:30px;
padding:24px;
box-shadow:var(--shadow);
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.hero-left{
display:flex;
align-items:center;
gap:18px;
}

.logo{
width:72px;
height:72px;
border-radius:22px;
background:linear-gradient(
135deg,
#ff5f85,
#ff8ca6
);
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:white;
}

.hero-title{
font-size:42px;
font-weight:700;
}

.hero-sub{
margin-top:6px;
font-size:20px;
color:var(--muted);
}

.hero-card{
background:#fff7fa;
border:1px solid #ffd9e3;
padding:16px;
border-radius:20px;
min-width:220px;
}

.hero-card-title{
font-weight:700;
margin-bottom:6px;
}

.dashboard{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:24px;
}

.panel{
background:var(--card);
border-radius:30px;
padding:24px;
box-shadow:var(--shadow);
}

.panel-title{
font-size:20px;
font-weight:700;
margin-bottom:18px;
}

.day-cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.day-card{
border-radius:22px;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border:2px solid #edf2f7;
}

.morning{
background:#fffaf2;
border-color:#ffe2a8;
}

.evening{
background:#f7f8ff;
border-color:#dfe5ff;
}

.day-card-title{
font-size:24px;
font-weight:700;
}

.day-card-time{
color:var(--muted);
margin-top:4px;
}

.day-status{
font-size:40px;
}

.progress-wrapper{
margin-top:24px;
}

.progress-label{
margin-bottom:10px;
font-weight:600;
}

.progress-bar{
height:14px;
background:#e5e7eb;
border-radius:999px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#4a7dff,
#73a0ff
);
transition:.3s;
}

.progress-row{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.circle-box{
display:flex;
justify-content:center;
align-items:center;
height:180px;
}

.circle{
width:160px;
height:160px;
border-radius:50%;
border:12px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
font-weight:700;
color:var(--primary);
}

.month-panel{
background:white;
border-radius:30px;
padding:24px;
box-shadow:var(--shadow);
}

.month-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.month-title{
font-size:42px;
font-weight:700;
}

.nav-btn{
width:56px;
height:56px;
border:none;
border-radius:18px;
background:#edf3ff;
color:var(--primary);
font-size:26px;
font-weight:bold;
cursor:pointer;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;
}

.weekday{
text-align:center;
font-weight:700;
color:var(--muted);
padding:10px;
}

.day{
background:white;
border-radius:24px;
padding:10px;
min-height:120px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
position:relative;
}

.today{
outline:3px solid var(--primary);
}

.day-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.day-number{
font-size:28px;
font-weight:700;
}

.status-dot{
width:12px;
height:12px;
border-radius:50%;
}

.green{background:var(--green);}
.yellow{background:var(--yellow);}
.red{background:var(--red);}
.gray{background:var(--gray);}
.blue{background:var(--primary);}

.row{
display:flex;
align-items:center;
gap:6px;
margin-top:6px;
}

.legend{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:24px;
padding-top:20px;
border-top:1px solid #e5e7eb;
}

.legend-item{
display:flex;
align-items:center;
gap:8px;
}

@media(max-width:900px){

.dashboard{
grid-template-columns:1fr;
}

.hero{
flex-direction:column;
align-items:flex-start;
gap:16px;
}

.hero-title{
font-size:30px;
}

.month-title{
font-size:28px;
}

.calendar{
overflow-x:auto;
grid-template-columns:repeat(7,minmax(110px,1fr));
}

}

</style>
</head>

<body>

<div class="hero">

<div class="hero-left">

<div class="logo">🩸</div>

<div>
<div class="hero-title">Лена ❤️</div>
<div class="hero-sub">
Тардиферрон 80 мг × 2 раза в день
</div>
<div class="hero-sub">
Курс приема железа
</div>
</div>

</div>

<div class="hero-card">
<div class="hero-card-title">
Курс поддержки
</div>
<div>
Забота о здоровье каждый день
</div>
</div>

</div>

<div id="app">
<div class="dashboard">

<div class="panel">

<div class="panel-title">
Сегодня
</div>

<div class="day-cards">

<div class="day-card morning">
<div>
<div class="day-card-title">🌅 Утро</div>
<div class="day-card-time">05:00–10:00</div>
</div>
<div id="todayMorning" class="day-status">⬜</div>
</div>

<div class="day-card evening">
<div>
<div class="day-card-title">🌙 Вечер</div>
<div class="day-card-time">20:00–22:00</div>
</div>
<div id="todayEvening" class="day-status">⬜</div>
</div>

</div>

<div class="progress-wrapper">

<div class="progress-label">
Выполнение месяца
</div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div class="progress-row">
<span>Прогресс</span>
<strong id="progress">0%</strong>
</div>

</div>

</div>

<div class="panel">

<div class="panel-title">
Статистика
</div>

<div class="circle-box">
<div class="circle">
<span id="circlePercent">0%</span>
</div>
</div>

</div>

</div>

<div class="month-panel">

<div class="month-header">

<button id="prev" class="nav-btn">‹</button>

<div id="monthTitle" class="month-title">
Июль 2026
</div>

<button id="next" class="nav-btn">›</button>

</div>

<div id="calendar" class="calendar"></div>

<div class="legend">

<div class="legend-item">
<div class="status-dot green"></div>
Выполнено
</div>

<div class="legend-item">
<div class="status-dot yellow"></div>
Частично
</div>

<div class="legend-item">
<div class="status-dot red"></div>
Пропуск
</div>

<div class="legend-item">
<div class="status-dot gray"></div>
Будущее
</div>

<div class="legend-item">
<div class="status-dot blue"></div>
Сегодня
</div>

</div>

</div>

<script>

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");

const weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

const months = [
"Январь","Февраль","Март","Апрель",
"Май","Июнь","Июль","Август",
"Сентябрь","Октябрь","Ноябрь","Декабрь"
];

let currentDate = new Date();

function storageKey(date,type){
return `lena_tardy_${date}_${type}`;
}

function renderCalendar(){

calendar.innerHTML="";

weekdays.forEach(day=>{
const d=document.createElement("div");
d.className="weekday";
d.innerText=day;
calendar.appendChild(d);
});

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

monthTitle.innerText=
`${months[month]} ${year}`;

const firstDay=new Date(year,month,1);

let startDay=firstDay.getDay();
startDay=startDay===0?6:startDay-1;

const daysInMonth=
new Date(year,month+1,0).getDate();

for(let i=0;i<startDay;i++){
const empty=document.createElement("div");
empty.className="day";
empty.style.visibility="hidden";
calendar.appendChild(empty);
}

let checked=0;
let total=daysInMonth*2;

const now=new Date();

for(let day=1;day<=daysInMonth;day++){

const dateString=
`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

const morning=
localStorage.getItem(
storageKey(dateString,"morning")
)==="true";

const evening=
localStorage.getItem(
storageKey(dateString,"evening")
)==="true";

if(morning) checked++;
if(evening) checked++;

const cellDate=
new Date(year,month,day);

let dot="gray";

if(cellDate <
new Date(
now.getFullYear(),
now.getMonth(),
now.getDate()
)){

if(morning && evening){
dot="green";
}else if(morning || evening){
dot="yellow";
}else{
dot="red";
}

}else{

if(morning && evening){
dot="green";
}else if(morning || evening){
dot="yellow";
}

}

const box=document.createElement("div");
box.className="day";

if(
day===now.getDate() &&
month===now.getMonth() &&
year===now.getFullYear()
){
box.classList.add("today");
dot="blue";
}

box.innerHTML=`
<div class="day-top">
<div class="day-number">${day}</div>
<div class="status-dot ${dot}"></div>
</div>

<div class="row">
<input
type="checkbox"
data-date="${dateString}"
data-type="morning"
${morning?"checked":""}
>
🌅
</div>

<div class="row">
<input
type="checkbox"
data-date="${dateString}"
data-type="evening"
${evening?"checked":""}
>
🌙
</div>
`;

calendar.appendChild(box);

}

const percent=
Math.round((checked/total)*100);

document.getElementById("progress").innerText=
percent+"%";

document.getElementById("circlePercent").innerText=
percent+"%";

document.getElementById("progressFill").style.width=
percent+"%";

const todayString=
`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

const tm=
localStorage.getItem(
storageKey(todayString,"morning")
)==="true";

const te=
localStorage.getItem(
storageKey(todayString,"evening")
)==="true";

document.getElementById("todayMorning").innerText=
tm?"✅":"⬜";

document.getElementById("todayEvening").innerText=
te?"✅":"⬜";

document.querySelectorAll("input").forEach(i=>{

i.addEventListener("change",function(){

localStorage.setItem(
storageKey(
this.dataset.date,
this.dataset.type
),
this.checked
);

renderCalendar();

});

});

}

document.getElementById("prev").onclick=()=>{
currentDate.setMonth(
currentDate.getMonth()-1
);
renderCalendar();
};

document.getElementById("next").onclick=()=>{
currentDate.setMonth(
currentDate.getMonth()+1
);
renderCalendar();
};

renderCalendar();

</script>
</div>

</body>
</html>
