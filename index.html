<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лена ❤️ Тардиферрон</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#f4f7fb;
padding:15px;
color:#222;
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
color:#666;
}

.stats{
background:white;
padding:15px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.month-nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.month-nav button{
border:none;
background:#ff6b81;
color:white;
padding:10px 15px;
border-radius:10px;
font-size:18px;
}

.month-title{
font-size:22px;
font-weight:700;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.weekday{
text-align:center;
font-size:12px;
font-weight:bold;
padding:5px;
}

.day{
background:white;
border-radius:12px;
padding:6px;
min-height:95px;
box-shadow:0 1px 4px rgba(0,0,0,.08);
}

.today{
border:2px solid #3498db;
}

.full{
border-left:4px solid #27ae60;
background:white;
}

.partial{
border-left:4px solid #f1c40f;
background:white;
}

.missed{
border-left:4px solid #e74c3c;
background:white;
}

.day-number{
font-weight:bold;
margin-bottom:4px;
}

label{
display:block;
font-size:11px;
margin-top:3px;
}

.empty{
visibility:hidden;
}
</style>
</head>

<body>

<div class="header">
<h1>❤️ ЛЕНА ❤️</h1>
<p>Тардиферрон 80 мг × 2 раза в день</p>
</div>

<div class="stats">
<div><strong>Утро:</strong> 05:00–10:00</div>
<div><strong>Вечер:</strong> 20:00–22:00</div>
<br>
<div><strong>Выполнение месяца:</strong> <span id="progress">0%</span></div>
</div>

<div class="month-nav">
<button id="prev">◀</button>
<div class="month-title" id="monthTitle"></div>
<button id="next">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<script>

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");
const progress = document.getElementById("progress");

const weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

const months = [
"Январь","Февраль","Март","Апрель",
"Май","Июнь","Июль","Август",
"Сентябрь","Октябрь","Ноябрь","Декабрь"
];

let currentDate = new Date();

function storageKey(date,type){
return `lena_tardy_${date}_${type}`;
}

function renderCalendar(){

calendar.innerHTML="";

weekdays.forEach(day=>{
const div=document.createElement("div");
div.className="weekday";
div.innerText=day;
calendar.appendChild(div);
});

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

monthTitle.innerText=`${months[month]} ${year}`;

const firstDay=new Date(year,month,1);

let startDay=firstDay.getDay();
startDay=startDay===0?6:startDay-1;

const daysInMonth=new Date(year,month+1,0).getDate();

for(let i=0;i<startDay;i++){
const empty=document.createElement("div");
empty.className="day empty";
calendar.appendChild(empty);
}

let checked=0;
let total=daysInMonth*2;

for(let day=1;day<=daysInMonth;day++){

const dateString=
`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

const morning=
localStorage.getItem(storageKey(dateString,"morning"))==="true";

const evening=
localStorage.getItem(storageKey(dateString,"evening"))==="true";

if(morning) checked++;
if(evening) checked++;

const div=document.createElement("div");

let status="missed";

if(morning && evening){
status="full";
}else if(morning || evening){
status="partial";
}

div.className=`day ${status}`;

const today=new Date();
  const todayString =
`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

const todayMorning =
localStorage.getItem(
storageKey(todayString,"morning")
)==="true";

const todayEvening =
localStorage.getItem(
storageKey(todayString,"evening")
)==="true";

const morningBlock =
document.getElementById("todayMorning");

const eveningBlock =
document.getElementById("todayEvening");

if(morningBlock){
morningBlock.innerHTML =
todayMorning
? "🌅 Утренний приём ✅"
: "🌅 Утренний приём ⬜";
}

if(eveningBlock){
eveningBlock.innerHTML =
todayEvening
? "🌙 Вечерний приём ✅"
: "🌙 Вечерний приём ⬜";
}

if(
today.getDate()===day &&
today.getMonth()===month &&
today.getFullYear()===year
){
div.classList.add("today");
}

div.innerHTML=`
<div class="day-number">${day}</div>

<label>
<input
type="checkbox"
data-date="${dateString}"
data-type="morning"
${morning?"checked":""}
>
🌅
</label>

<label>
<input
type="checkbox"
data-date="${dateString}"
data-type="evening"
${evening?"checked":""}
>
🌙
</label>
`;

calendar.appendChild(div);

}

progress.innerText=
Math.round((checked/total)*100)+"%";

document.querySelectorAll("input").forEach(input=>{

input.addEventListener("change",function(){

localStorage.setItem(
storageKey(
this.dataset.date,
this.dataset.type
),
this.checked
);

renderCalendar();

});

});

}

document.getElementById("prev").onclick=()=>{
currentDate.setMonth(currentDate.getMonth()-1);
renderCalendar();
};

document.getElementById("next").onclick=()=>{
currentDate.setMonth(currentDate.getMonth()+1);
renderCalendar();
};

renderCalendar();

</script>

</body>
</html>
